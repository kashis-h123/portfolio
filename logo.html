<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Navbar</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    .navbar{
      background:#3b2323;
      padding:12px 25px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo img{
      width:40px;
      height:40px;
      object-fit:cover;
      border-radius:4px;
      background:white;
      padding:2px;
    }

    .logo h2{
      color:white;
      font-size:22px;
      margin:0;
      font-weight:500;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">
      <img src="logo.png" alt="Logo">
      <h2>Divya Pawar</h2>
    </div>
  </nav>

</body>
</html>
